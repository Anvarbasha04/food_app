<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; }
        h1 { text-align:center; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            width: 220px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 150px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            padding: 8px;
            background: green;
            color: white;
            border: none;
            margin-top: 10px;
        }

        .cart {
            background: white;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>

<h1>🍽️ Food Menu</h1>

<div class="container">
    {% for food in foods %}
    <div class="card">
        <img src="{{ food.image }}">
        <h3>{{ food.name }}</h3>
        <p>₹{{ food.price }}</p>
        <a href="/add_to_cart/{{ food.id }}">
            <button>Add to Cart</button>
        </a>
    </div>
    {% endfor %}
</div>

<div class="cart">
    <h2>🛒 Cart</h2>
    {% for item in cart %}
        <p>{{ item.name }} - ₹{{ item.price }}</p>
    {% endfor %}
    <a href="/payment"><button>Go to Payment</button></a>
</div>

</body>
</html>
