<!DOCTYPE html>
<html>
<head>
<title>Food App</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<h2>🍔 Food Menu</h2>

<div class="grid">
{% for food in foods %}
<div class="card">
<img src="{{ food.image }}">
<h3>{{ food.name }}</h3>
<p>₹{{ food.price }}</p>
<a href="/add/{{ food.name }}/{{ food.price }}">
<button>Add to Cart</button>
</a>
</div>
{% endfor %}
</div>

<a href="/cart">🛒 Go to Cart</a>

</body>
</html>
