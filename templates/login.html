<div class="container">
<h2>Login</h2>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

<form method="post">
<input name="username" placeholder="Username"><br><br>
<input type="password" name="password" placeholder="Password"><br><br>
<button class="btn">Login</button>
</form>

<a href="/register">Register</a>
</div>
